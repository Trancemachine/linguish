<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英语学习 — Linguish</title>
  <meta name="description" content="学者的智囊团 · 智能英语学习平台" />
  <link rel="icon" href="https://raw.githubusercontent.com/Trancemachine/linguish/main/public/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#f8f9ff',
            foreground: '#434655',
            primary: '#004ac6',
            'primary-light': '#dce9ff',
            'primary-muted': '#eff4ff',
            border: '#c3c6d7',
            muted: '#737686',
            card: '#ffffff',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="min-h-full bg-background text-foreground antialiased">

  <main class="relative flex min-h-screen items-center justify-center overflow-hidden bg-[#0a1628] px-4">

    <!-- Background blur effects -->
    <div class="pointer-events-none absolute -left-32 -top-32 h-96 w-96 rounded-full bg-blue-600/20 blur-3xl"></div>
    <div class="pointer-events-none absolute -bottom-32 -right-32 h-96 w-96 rounded-full bg-blue-600/10 blur-3xl"></div>

    <div class="relative z-10 w-full max-w-md">

      <!-- Logo & Title -->
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-[#004ac6] text-white">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white">英语学习</h1>
        <p class="mt-2 text-sm text-white/60">专业英语学习</p>
      </div>

      <!-- Auth Card -->
      <div class="rounded-xl border border-[#c3c6d7] bg-white shadow-xl">

        <!-- Tabs -->
        <div class="flex border-b border-[#c3c6d7]">
          <button type="button" class="flex-1 py-3 text-sm font-medium transition border-b-2 border-[#004ac6] text-[#004ac6]">登录</button>
          <button type="button" class="flex-1 py-3 text-sm font-medium transition text-[#737686]">注册</button>
        </div>

        <!-- Login Form -->
        <form class="space-y-4 p-6">

          <!-- Email -->
          <div>
            <label class="mb-1.5 block text-sm text-[#737686]">电子邮箱</label>
            <div class="relative">
              <svg class="lucide lucide-mail absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-[#737686]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path><rect x="2" y="4" width="20" height="16" rx="2"></rect></svg>
              <input type="email" placeholder="example@academic.edu" class="w-full rounded-lg border border-[#c3c6d7] py-2.5 pl-10 pr-4 text-sm outline-none focus:border-[#004ac6]" />
            </div>
          </div>

          <!-- Password -->
          <div>
            <div class="mb-1.5 flex items-center justify-between">
              <label class="text-sm text-[#737686]">密码</label>
              <button type="button" class="text-xs text-[#004ac6]">忘记密码？</button>
            </div>
            <div class="relative">
              <input type="password" placeholder="••••••••" class="w-full rounded-lg border border-[#c3c6d7] py-2.5 pl-4 pr-10 text-sm outline-none focus:border-[#004ac6]" />
              <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#737686]">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="w-full rounded-lg bg-[#004ac6] py-2.5 text-sm font-medium text-white transition hover:bg-[#004ac6]/90">进入平台</button>

          <!-- Divider -->
          <div class="relative py-2">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-[#c3c6d7]"></div>
            </div>
            <span class="relative mx-auto block w-fit bg-white px-3 text-xs text-[#737686]">或</span>
          </div>

          <!-- Guest button -->
          <button type="button" class="flex w-full items-center justify-center gap-2 rounded-lg border border-[#004ac6]/20 bg-[#eff4ff] py-2.5 text-sm font-medium text-[#004ac6] transition hover:bg-[#dce9ff]">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"></path><path d="M20 2v4"></path><path d="M22 4h-4"></path><circle cx="4" cy="20" r="2"></circle></svg>
            先体验（游客模式）
          </button>
        </form>
      </div>

      <!-- Footer -->
      <p class="mt-6 text-center text-xs text-white/40">
        继续操作即表示您同意我们的
        <a href="#" class="text-[#dce9ff] underline">服务协议</a> 和
        <a href="#" class="text-[#dce9ff] underline">隐私政策</a>
      </p>

      <!-- GitHub link -->
      <div class="mt-4 text-center">
        <a href="https://github.com/Trancemachine/linguish" target="_blank" class="inline-flex items-center gap-1.5 text-xs text-white/40 hover:text-white/70 transition">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
          trancemachine/linguish
        </a>
      </div>

    </div>
  </main>

</body>
</html>
